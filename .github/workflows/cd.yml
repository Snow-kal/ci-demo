# 工作流名称，会显示在 GitHub Actions 页面中。
name: CD

# 触发条件：仅当 push 的引用是版本标签（v*）时执行发布流程。
# 例如 v1.0.0、v0.2.3 都会触发。
on:
  push:
    tags:
      - "v*"

# CD 需要创建 Release 并上传产物，因此需要写权限。
permissions:
  contents: write

jobs:
  # 定义发布作业：测试 -> 多平台构建 -> 发布 Release。
  release:
    # 在 Ubuntu Runner 上执行整个发布流程。
    runs-on: ubuntu-latest
    steps:
      # 拉取当前标签对应的源码。
      - name: Checkout source
        uses: actions/checkout@v4

      # 安装 Go 环境并启用依赖缓存。
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # 发布前再次跑测试，确保 tag 对应代码是可用的。
      - name: Verify with tests
        run: go test ./...

      # 交叉编译三个常见平台的二进制文件，并统一输出到 dist/ 目录。
      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cicd-demo-linux-amd64 ./cmd/cicd-demo
          GOOS=darwin GOARCH=amd64 go build -o dist/cicd-demo-darwin-amd64 ./cmd/cicd-demo
          GOOS=windows GOARCH=amd64 go build -o dist/cicd-demo-windows-amd64.exe ./cmd/cicd-demo

      # 自动创建 GitHub Release，并上传 dist/ 下的构建产物。
      # generate_release_notes: true 会基于提交自动生成发布说明草稿。
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
